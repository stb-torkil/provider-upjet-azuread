apiVersion: accesspackages.azuread.m.upbound.io/v1beta1
kind: AccessPackageCatalogRoleAssignment
metadata:
  annotations:
    meta.upbound.io/example-id: accesspackages/v1beta1/accesspackagecatalogroleassignment
  labels:
    testing.upbound.io/example-name: example
  name: example
  namespace: upbound-system
spec:
  forProvider:
    catalogIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    principalObjectIdSelector:
      matchLabels:
        testing.upbound.io/example-name: azuread_user
    roleId: ${data.azuread_access_package_catalog_role.example.object_id}

---

apiVersion: accesspackages.azuread.m.upbound.io/v1beta1
kind: AccessPackageCatalog
metadata:
  annotations:
    meta.upbound.io/example-id: accesspackages/v1beta1/accesspackagecatalogroleassignment
  labels:
    testing.upbound.io/example-name: example
  name: example
  namespace: upbound-system
spec:
  forProvider:
    description: Example access package catalog
    displayName: example-access-package-catalog
